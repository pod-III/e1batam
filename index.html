<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Categories & Timer — English 1 Batam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: { pink: '#ff4785', orange: '#ff7e33', green: '#00d063', blue: '#1ea7fd', dark: '#1e293b', chalk: '#f8fafc' }
                    },
                    fontFamily: { heading: ["Fredoka", "sans-serif"], body: ["Nunito", "sans-serif"] },
                    borderWidth: { 3: '3px' },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(30, 41, 59, 1)",
                        "neo-lg": "6px 6px 0px 0px rgba(30, 41, 59, 1)",
                        "neo-sm": "3px 3px 0px 0px rgba(30, 41, 59, 1)"
                    }
                }
            }
        };
    </script>

    <style>
        .card-neo {
            background: white;
            border: 3px solid #1e293b;
            border-radius: 1.5rem;
            box-shadow: 4px 4px 0px 0px rgba(30,41,59,1);
        }
        .dark .card-neo {
            background: #1e293b;
            border-color: #64748b;
            box-shadow: 4px 4px 0px 0px #64748b;
        }
        .btn-neo {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            border: 3px solid #1e293b;
            border-radius: 0.75rem;
            box-shadow: 4px 4px 0px 0px rgba(30,41,59,1);
            transition: all .1s ease;
        }
        .dark .btn-neo {
            border-color: #64748b;
            box-shadow: 4px 4px 0px 0px #64748b;
        }
        .btn-neo:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0px 0px rgba(30,41,59,1); }
        .dark .btn-neo:hover { box-shadow: 6px 6px 0px 0px #64748b; }
        .btn-neo:active { transform: translate(4px,4px); box-shadow: 0 0 0 0 transparent; }

        .input-neo {
            background: #f8fafc;
            border: 3px solid #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: #1e293b;
            resize: none;
            width: 100%;
        }
        .dark .input-neo { background: #0f172a; border-color: #64748b; color: #f8fafc; }
        .input-neo:focus { outline: none; background: white; box-shadow: 4px 4px 0px 0px #2979FF; border-color: #2979FF; }
        .dark .input-neo:focus { background: #1e293b; }

        @keyframes popIn {
            0% { transform: scale(0.6) translateY(-30px); opacity: 0; }
            60% { transform: scale(1.02) translateY(5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop-big { animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards; }
        .animate-pop { animation: popIn .3s cubic-bezier(.175,.885,.32,1.275) forwards; }
        
        /* Modal Overlay Background */
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out infinite;
        }

        /* Presentation Slide Animations */
        @keyframes slideOutLeft { to { transform: translateX(-100px); opacity: 0; } }
        @keyframes slideOutRight { to { transform: translateX(100px); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .slide-out-left { animation: slideOutLeft 0.25s ease-in forwards; }
        .slide-out-right { animation: slideOutRight 0.25s ease-in forwards; }
        .slide-in-right { animation: slideInRight 0.25s ease-out forwards; }
        .slide-in-left { animation: slideInLeft 0.25s ease-out forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>

    <script>
        const savedTheme = localStorage.getItem('theme_speech_randomizer');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-screen bg-brand-chalk dark:bg-slate-900 text-brand-dark dark:text-white transition-colors duration-300 font-body flex flex-col overflow-hidden">

    <header class="w-full bg-white dark:bg-slate-800 border-b-3 border-brand-dark dark:border-slate-500 shrink-0 z-40">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 min-w-0">
                <div class="hidden md:flex bg-brand-blue border-3 border-brand-dark dark:border-slate-500 w-12 h-12 rounded-xl items-center justify-center text-white shadow-neo-sm transform -rotate-3 shrink-0">
                    <i data-lucide="mic-2" class="w-7 h-7 stroke-[2.5px]"></i>
                </div>
                
                <!-- Tabs -->
                <div class="flex gap-2">
                    <button onclick="switchTab('order')" id="tabBtnOrder" class="btn-neo bg-brand-blue text-white px-3 md:px-4 py-1.5 md:py-2 text-sm md:text-base whitespace-nowrap">
                        <i data-lucide="users" class="w-4 h-4 inline-block mr-1"></i> Categories
                    </button>
                    <button onclick="switchTab('timer')" id="tabBtnTimer" class="btn-neo bg-white dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 md:px-4 py-1.5 md:py-2 text-sm md:text-base whitespace-nowrap">
                        <i data-lucide="timer" class="w-4 h-4 inline-block mr-1"></i> Timer
                    </button>
                    <button onclick="switchTab('topic')" id="tabBtnTopic" class="btn-neo bg-white dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 md:px-4 py-1.5 md:py-2 text-sm md:text-base whitespace-nowrap">
                        <i data-lucide="monitor-play" class="w-4 h-4 inline-block mr-1"></i> Topic
                    </button>
                </div>
            </div>
            
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="openBackupModal()" class="btn-neo bg-white dark:bg-slate-800 dark:text-white px-3 md:px-4 py-1.5 md:py-2 text-sm flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleTheme()" class="btn-neo bg-white dark:bg-slate-800 dark:text-white px-3 md:px-4 py-1.5 md:py-2 text-sm flex items-center gap-2">
                    <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                    <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto max-w-7xl w-full mx-auto px-4 md:px-6 py-4 md:py-6 h-full">

        <!-- ==================== TAB: SPEAKER CATEGORIES ==================== -->
        <div id="viewOrder" class="block h-full">
            <!-- INPUT STAGE -->
            <div id="inputStage" class="w-full animate-pop flex flex-col h-full">
                <div class="flex justify-between items-end mb-4 shrink-0">
                    <div>
                        <h2 class="font-heading font-bold text-xl md:text-3xl">Speaker Categories</h2>
                        <p class="text-slate-500 dark:text-slate-400 font-semibold mt-0.5 text-xs md:text-sm">Enter names for up to three different groups.</p>
                    </div>
                    <button onclick="loadDemo()" class="btn-neo bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 text-xs hidden md:block">Load Demo</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 flex-1 min-h-[250px] mb-4">
                    <!-- Category 1 -->
                    <div class="card-neo p-3 md:p-5 bg-white dark:bg-slate-800 flex flex-col">
                        <input type="text" id="cat1Name" value="Category A (SD)" class="w-full font-heading font-bold text-base md:text-xl mb-2 bg-transparent border-b-2 border-dashed border-slate-300 dark:border-slate-600 focus:outline-none focus:border-brand-blue shrink-0" />
                        <textarea id="cat1Input" class="input-neo flex-1 text-sm md:text-base leading-relaxed resize-none p-2 md:p-4" placeholder="Alice&#10;Bob&#10;Charlie"></textarea>
                    </div>
                    <!-- Category 2 -->
                    <div class="card-neo p-3 md:p-5 bg-white dark:bg-slate-800 flex flex-col">
                        <input type="text" id="cat2Name" value="Category B (SMP)" class="w-full font-heading font-bold text-base md:text-xl mb-2 bg-transparent border-b-2 border-dashed border-slate-300 dark:border-slate-600 focus:outline-none focus:border-brand-orange shrink-0" />
                        <textarea id="cat2Input" class="input-neo flex-1 text-sm md:text-base leading-relaxed resize-none p-2 md:p-4" placeholder="David&#10;Eve&#10;Frank"></textarea>
                    </div>
                    <!-- Category 3 -->
                    <div class="card-neo p-3 md:p-5 bg-white dark:bg-slate-800 flex flex-col">
                        <input type="text" id="cat3Name" value="Category C (SMA)" class="w-full font-heading font-bold text-base md:text-xl mb-2 bg-transparent border-b-2 border-dashed border-slate-300 dark:border-slate-600 focus:outline-none focus:border-brand-green shrink-0" />
                        <textarea id="cat3Input" class="input-neo flex-1 text-sm md:text-base leading-relaxed resize-none p-2 md:p-4" placeholder="Grace&#10;Heidi&#10;Ivan"></textarea>
                    </div>
                </div>

                <div class="flex justify-center max-w-sm mx-auto shrink-0 pb-4">
                    <button onclick="startReveal()" class="w-full btn-neo bg-brand-blue text-white py-3 text-lg md:text-xl tracking-wide flex items-center justify-center gap-2 hover:bg-blue-600">
                        <i data-lucide="shuffle" class="w-5 h-5 md:w-6 md:h-6 stroke-[2.5px]"></i> RANDOMIZE GROUPS
                    </button>
                </div>
            </div>

            <!-- REVEAL STAGE -->
            <div id="revealStage" class="hidden w-full h-full flex flex-col">
                <div class="flex items-center justify-between mb-4 shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="bg-brand-dark dark:bg-slate-700 text-white font-heading font-bold px-3 py-1.5 md:px-4 md:py-2 rounded-lg border-2 border-brand-dark dark:border-slate-500 text-xs md:text-sm">
                            Total Participants: <span id="totalCount">0</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="copyResults()" class="btn-neo bg-brand-blue text-white px-3 md:px-4 py-1.5 md:py-2 text-xs md:text-sm flex items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> <span class="hidden sm:inline">Copy</span>
                        </button>
                        <button onclick="resetAll()" class="btn-neo bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 md:px-4 py-1.5 md:py-2 text-xs md:text-sm flex items-center gap-2">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> <span class="hidden sm:inline">Edit Lists</span>
                        </button>
                    </div>
                </div>

                <!-- 3 Columns for Results (Optimized for 10+ items on Chromebook Screen) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 flex-1 min-h-[300px] pb-2">
                    <!-- Col 1 -->
                    <div class="flex flex-col gap-2 h-full overflow-hidden">
                        <div class="font-heading font-bold text-sm md:text-base text-center bg-brand-blue text-white py-1.5 rounded-xl border-2 border-brand-dark dark:border-slate-500 shadow-neo-sm shrink-0">
                            <span id="col1Title">Cat 1</span>
                        </div>
                        <div id="col1List" class="flex flex-col gap-1.5 overflow-y-auto pr-1 h-full"></div>
                    </div>

                    <!-- Col 2 -->
                    <div class="flex flex-col gap-2 h-full overflow-hidden">
                        <div class="font-heading font-bold text-sm md:text-base text-center bg-brand-orange text-white py-1.5 rounded-xl border-2 border-brand-dark dark:border-slate-500 shadow-neo-sm shrink-0">
                            <span id="col2Title">Cat 2</span>
                        </div>
                        <div id="col2List" class="flex flex-col gap-1.5 overflow-y-auto pr-1 h-full"></div>
                    </div>

                    <!-- Col 3 -->
                    <div class="flex flex-col gap-2 h-full overflow-hidden">
                        <div class="font-heading font-bold text-sm md:text-base text-center bg-brand-green text-white py-1.5 rounded-xl border-2 border-brand-dark dark:border-slate-500 shadow-neo-sm shrink-0">
                            <span id="col3Title">Cat 3</span>
                        </div>
                        <div id="col3List" class="flex flex-col gap-1.5 overflow-y-auto pr-1 h-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== TAB: TOPIC PRESENTATION ==================== -->
        <div id="viewTopic" class="hidden w-full h-full flex flex-col items-center justify-center gap-4 max-w-4xl mx-auto">
            
            <!-- Main Play Button Area -->
            <div class="w-full flex flex-col items-center justify-center flex-1 min-h-[250px] md:min-h-[300px]">
                <button onclick="presentSlideByIndex(0)" id="mainShowTopicBtn" class="btn-neo bg-brand-blue text-white py-6 md:py-8 px-10 md:px-16 text-3xl md:text-5xl tracking-wide flex items-center justify-center gap-4 hover:bg-blue-600 shadow-neo-lg hover:shadow-neo transition-all rounded-[2rem]">
                    <i data-lucide="play" class="w-10 h-10 md:w-14 md:h-14 fill-current"></i> SHOW TOPIC
                </button>
                <p id="noTopicWarning" class="mt-6 text-slate-500 font-bold text-sm md:text-base hidden">No slides saved yet. Add one below!</p>
            </div>

            <!-- Slides List / Manager -->
            <div class="w-full card-neo p-4 md:p-6 bg-white dark:bg-slate-800 flex flex-col h-[40vh] md:h-[45vh] shrink-0 mb-4">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h2 class="font-heading font-bold text-lg md:text-2xl">Saved Slides</h2>
                    <div class="flex gap-2">
                        <button onclick="toggleTopicVisibility()" id="toggleVisibilityBtn" class="btn-neo bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm flex items-center gap-1 hover:bg-slate-200">
                            <i data-lucide="eye" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> <span class="hidden sm:inline">Show</span>
                        </button>
                        <button onclick="openTopicModal()" class="btn-neo bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm flex items-center gap-1 hover:bg-slate-200">
                            <i data-lucide="plus" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Add Slide
                        </button>
                    </div>
                </div>
                <div id="slideList" class="flex flex-col gap-2 overflow-y-auto pr-2 pb-2 h-full">
                    <!-- Slides injected here -->
                </div>
            </div>

        </div>

    </main>

    <!-- ==================== TAB: SPEAKER TIMER ==================== -->
    <div id="viewTimer" class="hidden fixed top-16 md:top-20 inset-x-0 bottom-0 z-30 transition-colors duration-500 bg-brand-green">
        <div class="flex flex-col items-center justify-center w-full h-full relative p-6">
            
            <button onclick="openTimerSettings()" class="absolute top-4 right-4 md:top-8 md:right-8 btn-neo bg-black/10 hover:bg-black/20 text-white border-transparent p-3 md:p-4 backdrop-blur-sm transition-all z-40">
                <i data-lucide="settings" class="w-6 h-6 md:w-8 md:h-8"></i>
            </button>
            
            <div class="flex flex-col items-center justify-center flex-1 w-full pb-20 md:pb-32">
                <div id="timeDisplay" class="text-[6rem] sm:text-[9rem] md:text-[15rem] lg:text-[20rem] font-heading font-bold tracking-widest tabular-nums text-white leading-none drop-shadow-2xl">
                    00:00
                </div>
                <div class="mt-4 md:mt-8 text-white/90 font-bold tracking-wide text-xl md:text-4xl drop-shadow-lg">
                    Target: <span id="targetDisplay">05:00</span>
                </div>
            </div>

            <div class="absolute bottom-6 md:bottom-12 left-1/2 -translate-x-1/2 flex gap-3 md:gap-6 w-full max-w-4xl px-4 z-40">
                <button onclick="startTimer()" id="startBtn" class="flex-1 btn-neo bg-white text-slate-800 py-4 md:py-6 text-lg md:text-3xl hover:bg-slate-100 flex items-center justify-center gap-2 border-transparent shadow-2xl">
                    <i data-lucide="play" class="w-6 h-6 md:w-8 md:h-8 fill-current"></i> Start
                </button>
                <button onclick="pauseTimer()" class="flex-1 btn-neo bg-black/20 text-white py-4 md:py-6 text-lg md:text-3xl hover:bg-black/30 flex items-center justify-center gap-2 border-transparent backdrop-blur-sm shadow-2xl">
                    <i data-lucide="pause" class="w-6 h-6 md:w-8 md:h-8 fill-current"></i> Pause
                </button>
                <button onclick="resetTimer()" class="flex-1 btn-neo bg-black/20 text-white py-4 md:py-6 text-lg md:text-3xl hover:bg-black/30 flex items-center justify-center gap-2 border-transparent backdrop-blur-sm shadow-2xl">
                    <i data-lucide="square" class="w-6 h-6 md:w-8 md:h-8 fill-current"></i> Reset
                </button>
            </div>
        </div>
    </div>


    <!-- Timer Settings Modal -->
    <div id="timerModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center modal-overlay p-4">
        <div class="card-neo p-6 md:p-8 max-w-sm w-full bg-white dark:bg-slate-800 animate-pop">
            <h3 class="font-heading font-bold text-xl md:text-2xl mb-6">Timer Settings</h3>
            
            <div class="flex gap-4 mb-8">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-slate-500 mb-2">Minutes</label>
                    <input type="number" id="settingMins" min="0" max="60" value="5" class="input-neo w-full text-center text-xl md:text-2xl" />
                </div>
                <div class="flex items-center text-2xl md:text-3xl font-bold pb-2">:</div>
                <div class="flex-1">
                    <label class="block text-sm font-bold text-slate-500 mb-2">Seconds</label>
                    <input type="number" id="settingSecs" min="0" max="59" value="0" class="input-neo w-full text-center text-xl md:text-2xl" />
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeTimerSettings()" class="flex-1 btn-neo bg-slate-200 dark:bg-slate-600 text-slate-700 dark:text-slate-200 py-3">Cancel</button>
                <button onclick="saveTimerSettings()" class="flex-1 btn-neo bg-brand-green text-white py-3">Save</button>
            </div>
        </div>
    </div>

    <!-- Topic/Slide Modal -->
    <div id="topicModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center modal-overlay p-4">
        <div class="card-neo p-6 md:p-8 max-w-lg w-full bg-white dark:bg-slate-800 animate-pop flex flex-col gap-4">
            <h3 class="font-heading font-bold text-2xl" id="topicModalTitle">Create Slide</h3>
            <input type="hidden" id="topicId" value="">
            
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-1">Header (e.g., Event Name)</label>
                <input type="text" id="topicHeader" placeholder="Grand Final Debate" class="input-neo p-3 w-full text-sm md:text-base" />
            </div>
            <div class="flex flex-col min-h-[120px]">
                <label class="block text-sm font-bold text-slate-500 mb-1">Topic / Motion</label>
                <textarea id="topicMotion" placeholder="This House would ban the development of autonomous weapons." class="input-neo p-3 w-full text-base md:text-lg font-bold text-brand-blue dark:text-blue-400 flex-1 resize-none" rows="4"></textarea>
            </div>

            <div class="flex gap-3 mt-2 md:mt-4">
                <button onclick="closeTopicModal()" class="flex-1 btn-neo bg-slate-200 dark:bg-slate-600 text-slate-700 dark:text-slate-200 py-3">Cancel</button>
                <button onclick="saveSlide()" class="flex-[2] btn-neo bg-brand-green text-white py-3">Save Slide</button>
            </div>
        </div>
    </div>

    <!-- Backup & Restore Modal -->
    <div id="backupModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center modal-overlay p-4">
        <div class="card-neo p-6 md:p-8 max-w-sm w-full bg-white dark:bg-slate-800 animate-pop flex flex-col gap-6 text-center">
            <div>
                <h3 class="font-heading font-bold text-2xl mb-1">Backup & Restore</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 font-semibold">Save your categories, slides, and timer settings to a file.</p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="exportData()" class="w-full btn-neo bg-brand-blue text-white py-3 md:py-4 flex items-center justify-center gap-2 hover:bg-blue-600">
                    <i data-lucide="download" class="w-5 h-5"></i> Export Backup (JSON)
                </button>
                
                <label class="w-full btn-neo bg-brand-orange text-white py-3 md:py-4 flex items-center justify-center gap-2 hover:bg-orange-600 cursor-pointer">
                    <i data-lucide="upload" class="w-5 h-5"></i> Import Backup (JSON)
                    <input type="file" id="importFileInput" accept=".json" class="hidden" onchange="importData(event)">
                </label>
            </div>

            <button onclick="closeBackupModal()" class="btn-neo bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 hover:bg-slate-300">Close</button>
        </div>
    </div>

    <!-- Presentation Overlay -->
    <div id="presentationOverlay" class="hidden fixed inset-0 z-[70] bg-brand-dark dark:bg-slate-900 text-white flex flex-col items-center justify-center p-8 md:p-24 text-center overflow-hidden">
        
        <!-- Close -->
        <button onclick="stopPresentation()" class="absolute top-4 right-4 md:top-6 md:right-6 btn-neo bg-white/10 hover:bg-white/20 text-white border-transparent p-2.5 md:p-3 backdrop-blur-sm transition-all z-[80]">
            <i data-lucide="x" class="w-6 h-6 md:w-8 md:h-8"></i>
        </button>
        
        <!-- Navigation Controls -->
        <button onclick="prevSlide()" class="absolute left-3 md:left-8 top-1/2 -translate-y-1/2 btn-neo bg-white/10 hover:bg-white/20 text-white border-transparent p-2 md:p-4 backdrop-blur-sm transition-all z-[80]">
            <i data-lucide="chevron-left" class="w-8 h-8 md:w-10 md:h-10"></i>
        </button>
        <button onclick="nextSlide()" class="absolute right-3 md:right-8 top-1/2 -translate-y-1/2 btn-neo bg-white/10 hover:bg-white/20 text-white border-transparent p-2 md:p-4 backdrop-blur-sm transition-all z-[80]">
            <i data-lucide="chevron-right" class="w-8 h-8 md:w-10 md:h-10"></i>
        </button>

        <!-- Slide Content Wrapper for Animation -->
        <div id="slideContentContainer" class="flex flex-col items-center justify-center w-full max-w-6xl px-12 md:px-20 z-50">
            <div id="displayHeader" class="text-brand-blue font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] text-lg md:text-3xl lg:text-4xl mb-4 md:mb-8 drop-shadow-md"></div>
            <div id="displayMotion" class="font-heading font-bold text-3xl md:text-6xl lg:text-7xl text-brand-chalk max-w-6xl leading-tight drop-shadow-lg"></div>
        </div>

        <!-- Indicator -->
        <div id="slideIndicator" class="absolute bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 text-slate-500 font-bold tracking-widest text-xs md:text-sm uppercase z-[80]"></div>
    </div>

    <script>
        // --- TAB LOGIC ---
        function switchTab(tab) {
            const viewOrder = document.getElementById('viewOrder');
            const viewTimer = document.getElementById('viewTimer');
            const viewTopic = document.getElementById('viewTopic');

            if (viewOrder) viewOrder.classList.toggle('hidden', tab !== 'order');
            if (viewTimer) viewTimer.classList.toggle('hidden', tab !== 'timer');
            if (viewTopic) viewTopic.classList.toggle('hidden', tab !== 'topic');

            const tabs = ['order', 'timer', 'topic'];
            const activeClass = "btn-neo bg-brand-blue text-white px-3 md:px-4 py-1.5 md:py-2 text-sm md:text-base whitespace-nowrap";
            const inactiveClass = "btn-neo bg-white dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 md:px-4 py-1.5 md:py-2 text-sm md:text-base whitespace-nowrap";

            tabs.forEach(t => {
                const btn = document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1));
                if (btn) btn.className = tab === t ? activeClass : inactiveClass;
            });
        }

        // --- BACKUP & RESTORE LOGIC ---
        function openBackupModal() {
            document.getElementById('backupModal').classList.remove('hidden');
        }

        function closeBackupModal() {
            document.getElementById('backupModal').classList.add('hidden');
        }

        function exportData() {
            const data = {};
            // Loop through all localStorage items and only grab ours
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('speech_')) {
                    data[key] = localStorage.getItem(key);
                }
            }
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `speech_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Backup downloaded successfully!');
            closeBackupModal();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    let importedCount = 0;
                    
                    for (const key in data) {
                        if (key.startsWith('speech_')) {
                            localStorage.setItem(key, data[key]);
                            importedCount++;
                        }
                    }
                    
                    if (importedCount > 0) {
                        showToast('Backup restored successfully! Reloading...');
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        showToast('No compatible data found in file.', true);
                    }
                } catch (err) {
                    showToast('Invalid backup file!', true);
                }
            };
            reader.readAsText(file);
            // Reset input so the same file can be selected again if needed
            event.target.value = '';
        }

        // --- TIMER LOGIC (COUNT UP) ---
        let timerInterval;
        let timeElapsed = 0; 
        let maxTime = 300; 

        function updateTimerDisplay() {
            const mins = Math.floor(timeElapsed / 60).toString().padStart(2, '0');
            const secs = (timeElapsed % 60).toString().padStart(2, '0');
            const display = document.getElementById('timeDisplay');
            if(display) display.textContent = `${mins}:${secs}`;

            const remaining = maxTime - timeElapsed;
            const container = document.getElementById('viewTimer');
            
            if(!container || !display) return;

            container.classList.remove('bg-brand-green', 'bg-brand-orange', 'bg-brand-pink', 'bg-black');
            display.classList.remove('animate-shake', 'text-brand-pink');

            if (remaining <= 0) {
                container.classList.add('bg-black');
                display.classList.add('animate-shake', 'text-brand-pink');
            } else if (remaining > 60) {
                container.classList.add('bg-brand-green');
            } else if (remaining <= 60 && remaining > 20) {
                container.classList.add('bg-brand-orange');
            } else {
                container.classList.add('bg-brand-pink');
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeElapsed = 0;
            updateTimerDisplay();
        }

        function openTimerSettings() {
            pauseTimer();
            document.getElementById('settingMins').value = Math.floor(maxTime / 60);
            document.getElementById('settingSecs').value = maxTime % 60;
            document.getElementById('timerModal').classList.remove('hidden');
        }

        function closeTimerSettings() {
            document.getElementById('timerModal').classList.add('hidden');
        }

        function saveTimerSettings() {
            const m = parseInt(document.getElementById('settingMins').value) || 0;
            const s = parseInt(document.getElementById('settingSecs').value) || 0;
            maxTime = (m * 60) + s;
            
            const targetStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            document.getElementById('targetDisplay').textContent = targetStr;
            
            localStorage.setItem('speech_maxTime', maxTime); 

            closeTimerSettings();
            updateTimerDisplay(); 
            showToast('Timer settings saved!');
        }


        // --- CATEGORY ORDER LOGIC ---
        function getListLines(id) {
            const el = document.getElementById(id);
            if (!el) return [];
            const raw = el.value.trim();
            if (!raw) return [];
            return raw.split(/\n/).map(n => n.trim()).filter(n => n.length > 0);
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function renderRevealedLists(lists) {
            const totalNames = lists[0].length + lists[1].length + lists[2].length;

            document.getElementById('col1Title').textContent = document.getElementById('cat1Name').value || 'Category A (SD)';
            document.getElementById('col2Title').textContent = document.getElementById('cat2Name').value || 'Category B (SMP)';
            document.getElementById('col3Title').textContent = document.getElementById('cat3Name').value || 'Category C (SMA)';

            const cols = ['col1List', 'col2List', 'col3List'];
            const dots = ['bg-brand-blue', 'bg-brand-orange', 'bg-brand-green'];

            lists.forEach((list, i) => {
                const listContainer = document.getElementById(cols[i]);
                if(!listContainer) return;
                
                listContainer.innerHTML = ''; 
                
                // Denser UI to fit 10+ items easily on Chromebooks
                list.forEach((name, idx) => {
                    const card = document.createElement('div');
                    card.className = `card-neo p-1.5 md:p-2 flex items-center gap-1.5 md:gap-2 border-2 border-brand-dark dark:border-slate-500 shrink-0`;
                    card.innerHTML = `
                        <div class="w-5 h-5 md:w-6 md:h-6 rounded-full ${dots[i]} text-white flex items-center justify-center font-bold text-[9px] md:text-[10px] shrink-0">${idx + 1}</div>
                        <div class="font-heading font-bold text-xs md:text-sm text-brand-dark dark:text-white truncate leading-tight">${escapeHtml(name)}</div>
                    `;
                    listContainer.appendChild(card);
                });
            });
            
            document.getElementById('totalCount').textContent = totalNames;
            document.getElementById('inputStage').classList.add('hidden');
            document.getElementById('revealStage').classList.remove('hidden');
        }

        function startReveal() {
            const l1 = getListLines('cat1Input');
            const l2 = getListLines('cat2Input');
            const l3 = getListLines('cat3Input');

            const totalNames = l1.length + l2.length + l3.length;
            if (totalNames === 0) {
                showToast('Please enter names in at least one category.', true);
                return;
            }

            const lists = [shuffle(l1), shuffle(l2), shuffle(l3)];

            localStorage.setItem('speech_generatedLists', JSON.stringify(lists));
            localStorage.setItem('speech_isRevealed', 'true');

            renderRevealedLists(lists);
        }

        function copyResults() {
            try {
                const savedLists = JSON.parse(localStorage.getItem('speech_generatedLists'));
                if (!savedLists) return;

                const t1 = document.getElementById('cat1Name').value || 'Category A (SD)';
                const t2 = document.getElementById('cat2Name').value || 'Category B (SMP)';
                const t3 = document.getElementById('cat3Name').value || 'Category C (SMA)';
                const titles = [t1, t2, t3];

                let out = '🎤 Speech Order — English 1 Batam\n\n';
                
                savedLists.forEach((list, i) => {
                    if (list.length > 0) {
                        out += `** ${titles[i]} **\n`;
                        list.forEach((name, idx) => {
                            out += `${idx + 1}. ${name}\n`;
                        });
                        out += '\n';
                    }
                });

                navigator.clipboard.writeText(out.trim()).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Copy failed', true));
            } catch(e) {
                showToast('Copy failed', true);
            }
        }

        function resetAll() {
            localStorage.removeItem('speech_isRevealed');
            localStorage.removeItem('speech_generatedLists');
            document.getElementById('revealStage').classList.add('hidden');
            document.getElementById('inputStage').classList.remove('hidden');
        }

        function loadDemo() {
            document.getElementById('cat1Input').value = "Alice\nBob\nCharlie\nDiana\nEric\nFiona\nGeorge\nHarry\nIsabel\nJacob\nKaren";
            document.getElementById('cat2Input').value = "Ivy\nJack\nKelly\nLiam\nMia\nNoah\nOlivia\nPaul\nQuinn\nRyan";
            document.getElementById('cat3Input').value = "Peter\nQuinn\nRose\nSam\nTyler\nUma\nVictor\nWendy\nXavier\nYara\nZane\nAdam";
            
            ['cat1Input', 'cat2Input', 'cat3Input'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.dispatchEvent(new Event('input'));
            });

            showToast('Demo names loaded');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg, isError=false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = `toast fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-heading font-bold text-sm shadow-neo z-50 animate-pop flex items-center gap-2 border-3 border-brand-dark dark:border-slate-500 ${isError?'bg-brand-pink text-white':'bg-brand-green text-white'}`;
            t.innerHTML = isError ? `<i data-lucide="alert-circle" class="w-5 h-5"></i> ${msg}` : `<i data-lucide="check" class="w-5 h-5"></i> ${msg}`;
            document.body.appendChild(t);
            if(window.lucide) lucide.createIcons();
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translate(-50%,20px)'; t.style.transition='all .3s'; setTimeout(()=>t.remove(),300); }, 3000);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_speech_randomizer', isDark?'dark':'light');
        }


        // --- SLIDES LOGIC (TOPIC TAB) ---
        let savedSlides = [];
        let currentPresentationIndex = -1;
        let isTopicListVisible = false;

        function toggleTopicVisibility() {
            isTopicListVisible = !isTopicListVisible;
            renderSlides();
        }

        function loadSlides() {
            try {
                savedSlides = JSON.parse(localStorage.getItem('speech_slides')) || [];
                renderSlides();
            } catch (e) {
                savedSlides = [];
            }
        }

        function openTopicModal() {
            clearSlideForm();
            document.getElementById('topicModalTitle').textContent = 'Create Slide';
            document.getElementById('topicModal').classList.remove('hidden');
        }

        function closeTopicModal() {
            document.getElementById('topicModal').classList.add('hidden');
            clearSlideForm();
        }

        function saveSlide() {
            const idInput = document.getElementById('topicId').value;
            const header = document.getElementById('topicHeader').value.trim();
            const motion = document.getElementById('topicMotion').value.trim();

            if (!motion) return showToast('Please enter a topic/motion', true);

            if (idInput) {
                const idx = savedSlides.findIndex(s => s.id == idInput);
                if (idx > -1) {
                    savedSlides[idx] = { id: parseInt(idInput), header, motion };
                }
            } else {
                savedSlides.push({ id: Date.now(), header, motion });
            }

            localStorage.setItem('speech_slides', JSON.stringify(savedSlides));
            closeTopicModal();
            renderSlides();
            showToast('Slide saved!');
        }

        function clearSlideForm() {
            document.getElementById('topicId').value = '';
            document.getElementById('topicHeader').value = '';
            document.getElementById('topicMotion').value = '';
        }

        function renderSlides() {
            const container = document.getElementById('slideList');
            const mainBtn = document.getElementById('mainShowTopicBtn');
            const warning = document.getElementById('noTopicWarning');
            const visibilityBtn = document.getElementById('toggleVisibilityBtn');
            
            if(!container) return;
            
            if(visibilityBtn) {
                visibilityBtn.innerHTML = isTopicListVisible 
                    ? '<i data-lucide="eye-off" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> <span class="hidden sm:inline">Hide</span>'
                    : '<i data-lucide="eye" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> <span class="hidden sm:inline">Show</span>';
            }
            
            container.innerHTML = '';
            
            if (savedSlides.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-sm italic py-4">No slides saved yet. Click "Add Slide" above!</div>';
                mainBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                warning.classList.remove('hidden');
                if(window.lucide) lucide.createIcons();
                return;
            }

            mainBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            warning.classList.add('hidden');

            // Render sequentially 
            savedSlides.forEach((slide, index) => {
                const el = document.createElement('div');
                el.className = 'border-2 border-brand-dark dark:border-slate-600 rounded-xl p-3 flex flex-row items-center justify-between gap-4 bg-slate-50 dark:bg-slate-700/50 shrink-0';
                
                const displayMotion = isTopicListVisible ? escapeHtml(slide.motion || '') : '<span class="text-slate-400 dark:text-slate-500 tracking-widest text-lg md:text-xl">••••••••••••••••••••</span>';

                el.innerHTML = `
                    <div class="flex-1 min-w-0">
                        ${slide.header ? `<div class="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-0.5">${escapeHtml(slide.header)}</div>` : ''}
                        <div class="font-heading font-bold text-sm md:text-base text-brand-blue truncate">${displayMotion}</div>
                    </div>
                    <div class="flex gap-1.5 shrink-0">
                        <button onclick="presentSlideByIndex(${index})" class="btn-neo bg-brand-green text-white w-8 h-8 flex items-center justify-center hover:bg-green-500 p-0"><i data-lucide="play" class="w-4 h-4 fill-current"></i></button>
                        <button onclick="editSlide(${slide.id})" class="btn-neo bg-slate-200 dark:bg-slate-600 text-slate-700 dark:text-slate-200 w-8 h-8 flex items-center justify-center hover:bg-slate-300 p-0"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                        <button onclick="deleteSlide(${slide.id})" class="btn-neo bg-brand-pink text-white w-8 h-8 flex items-center justify-center hover:bg-pink-500 p-0"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                container.appendChild(el);
            });
            if(window.lucide) lucide.createIcons();
        }

        function editSlide(id) {
            const slide = savedSlides.find(s => s.id == id);
            if (!slide) return;
            document.getElementById('topicId').value = slide.id;
            document.getElementById('topicHeader').value = slide.header;
            document.getElementById('topicMotion').value = slide.motion;
            
            document.getElementById('topicModalTitle').textContent = 'Edit Slide';
            document.getElementById('topicModal').classList.remove('hidden');
        }

        function deleteSlide(id) {
            if(!confirm('Are you sure you want to delete this slide?')) return;
            savedSlides = savedSlides.filter(s => s.id != id);
            localStorage.setItem('speech_slides', JSON.stringify(savedSlides));
            renderSlides();
            showToast('Slide deleted');
        }

        // --- Presentation Overlay Navigation (With Animations) ---
        function presentSlideByIndex(index) {
            if (savedSlides.length === 0 || index < 0 || index >= savedSlides.length) return;
            
            currentPresentationIndex = index;
            const container = document.getElementById('slideContentContainer');
            
            // Setup Initial Content
            const slide = savedSlides[currentPresentationIndex];
            document.getElementById('displayHeader').textContent = slide.header || '';
            document.getElementById('displayMotion').textContent = slide.motion || '';
            document.getElementById('slideIndicator').textContent = `Slide ${currentPresentationIndex + 1} of ${savedSlides.length}`;
            
            // Clean classes and show modal
            container.className = 'flex flex-col items-center justify-center w-full max-w-6xl px-12 md:px-20 z-50 animate-pop';
            document.getElementById('presentationOverlay').classList.remove('hidden');
            
            // Attach listener
            document.addEventListener('keydown', handlePresentationKeys);
        }

        function updatePresentationView(direction = 'next') {
            if (currentPresentationIndex < 0 || currentPresentationIndex >= savedSlides.length) return;
            
            const slide = savedSlides[currentPresentationIndex];
            const container = document.getElementById('slideContentContainer');
            
            // Slide OUT animation based on direction
            container.classList.remove('animate-pop', 'slide-in-right', 'slide-in-left');
            container.classList.add(direction === 'next' ? 'slide-out-left' : 'slide-out-right');
            
            // Wait for out animation to finish, then swap content and slide IN
            setTimeout(() => {
                document.getElementById('displayHeader').textContent = slide.header || '';
                document.getElementById('displayMotion').textContent = slide.motion || '';
                document.getElementById('slideIndicator').textContent = `Slide ${currentPresentationIndex + 1} of ${savedSlides.length}`;
                
                container.classList.remove('slide-out-left', 'slide-out-right');
                container.classList.add(direction === 'next' ? 'slide-in-right' : 'slide-in-left');
            }, 250); // matches the 0.25s animation duration
        }

        function nextSlide() {
            if (currentPresentationIndex < savedSlides.length - 1) {
                currentPresentationIndex++;
                updatePresentationView('next');
            } else {
                showToast('End of slides');
            }
        }

        function prevSlide() {
            if (currentPresentationIndex > 0) {
                currentPresentationIndex--;
                updatePresentationView('prev');
            } else {
                showToast('Beginning of slides');
            }
        }

        function stopPresentation() {
            document.getElementById('presentationOverlay').classList.add('hidden');
            document.removeEventListener('keydown', handlePresentationKeys);
            currentPresentationIndex = -1;
        }

        function handlePresentationKeys(e) {
            if (e.key === 'ArrowRight' || e.key === 'Space' || e.key === 'Enter') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'Escape') {
                stopPresentation();
            }
        }


        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            // Restore categories text inputs from local storage
            const inputs = ['cat1Name', 'cat2Name', 'cat3Name', 'cat1Input', 'cat2Input', 'cat3Input'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const savedValue = localStorage.getItem(`speech_${id}`);
                if (savedValue !== null) {
                    el.value = savedValue;
                }
                el.addEventListener('input', (e) => {
                    localStorage.setItem(`speech_${id}`, e.target.value);
                });
            });

            // Check if lists were already revealed in a previous session
            if (localStorage.getItem('speech_isRevealed') === 'true') {
                try {
                    const savedLists = JSON.parse(localStorage.getItem('speech_generatedLists'));
                    if (savedLists && savedLists.length === 3) {
                        renderRevealedLists(savedLists);
                    }
                } catch (e) {
                    console.error("Could not load generated lists", e);
                }
            }

            // Restore timer settings
            const savedMaxTime = localStorage.getItem('speech_maxTime');
            if (savedMaxTime !== null) {
                maxTime = parseInt(savedMaxTime, 10);
                const m = Math.floor(maxTime / 60);
                const s = maxTime % 60;
                document.getElementById('targetDisplay').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                document.getElementById('settingMins').value = m;
                document.getElementById('settingSecs').value = s;
            }

            // Load saved slides
            loadSlides();

            if(window.lucide) lucide.createIcons();
            updateTimerDisplay(); // initialize colors
        });
    </script>
</body>
</html>
